<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Анкета|Форма</title>
</head>
<body>
    <button id="btnRu">Русский</button>
    <button id="btnEn">English</button>
    <h1 id="titleL"></h1>

    <!-- ФИО -->
    <form id="developerForm" action="#" method="post">
        <label for="fullname" id="fullnameL"><span style="color:#e53e3e;">*</span></label>
        <input type="text" id="fullname" name="fullname" placeholder="Баранов Андрей Александрович" required>

    <!-- ТЕЛЕФОН -->
        <label for="phone" id="phoneL"></label>
        <input type="tel" name="phone" placeholder="+7 999 123 45 67" pattern="[\+0-9\s\-\(\)]+">
        <div id="phoneHelpL"></div>

    <!-- email -->
        <label for="email" id="emailL"><span style="color:#e53e3e;">*</span>
        </label>
        <input type="email" id="email" name="email" placeholder="baranow@xemple.com" required>

    <!-- ДАТА РОЖДЕНИЯ -->
        <label for="birthdate" id="birthdateL"></label>
        <input type="date" id="birthdate" name="birthdate">

    <!-- ПОЛ -->
        <label for="gender" id="genderL"></label>
        <input type="radio" name="gender" value="male"><span id="genderMaleL">Мужской</span>
        <input type="radio" name="gender" value="female"><span id="genderFemaleL">Женский</span>
        <input type="radio" name="gender" value="unknown" checked><span id="genderunknownL">Не указан</span>

    <!-- ЛЮБИМЫЙ ЯП -->
        <label for="lang" id=langL></label>
        <select name="fav_langs" id="fav_langs" multiple size="6">
            <option value="Pascal">Pascal</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="JavaScript">JavaScript</option>
                <option value="PHP">PHP</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="Haskel">Haskel</option>
                <option value="Clojure">Clojure</option>
                <option value="Prolog">Prolog</option>
                <option value="Scala">Scala</option>
                <option value="Go">Go</option>
            <div id="langHelpL"></div>
        </select>

    <!-- БИО-->
        <label id="bioL"></label>
        <textarea id="bio" name="bio" placeholder="..."></textarea>

    <!-- Чекбокс -->
        <label id="checkL"></label>
        <input type="checkbox" name="contract_agreed" id="contractCheck" value="yes">
        <label id="contractL"></label>

    <!-- кнопка сохранить -->
    <button type="button" id=saveButton></button>
    </form>
    <script src="script.js"></script>

<!-- всплывающее уведамление -->

</body>
</html>
