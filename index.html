<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Анкета|Форма</title>
</head>
<body>
    <h1 id="fullnameL"></h1>
    <button id="btnRu">Русский</button>
    <button id="btnEn">English</button>

    <!-- ФИО -->
    <form id="developerForm" action="#" method="post">
        <label for="fullname"><span style="color:#e53e3e;">*</span></label>
        <input type="text" id="fullname" name="fullname" placeholder="Баранов Андрей Александрович" required>

    <!-- ТЕЛЕФОН -->>
        <label for="phone">Телефон</label>
        <input type="tel" name="phone" placeholder="+7 999 123 45 67" pattern="[\+0-9\s\-\(\)]+">
        <div>Формат любой, рекомендуется +7 или 8</div>

    <!-- email -->
        <label for="email">E-mail <span style="color:#e53e3e;">*</span>
        </label>
        <input type="email" id="email" name="email" placeholder="baranow@xemple.com" required>

    <!-- ДАТА РОЖДЕНИЯ -->
        <label for="birthdate">Дата рождения</label>
        <input type="date" id="birthdate" name="birthdate">

    <!-- ПОЛ -->
        <label for="gender">Пол</label>
        <input type="radio" name="gender" value="male"> Мужской
        <input type="radio" name="gender" value="female"> Женский
        <input type="radio" name="gender" value="unknown" checked> Не указан
    <!-- ЛЮБИМЫЙ ЯП -->
        <label for="lang"></label>
    </form>
    <script src="script.js"></script>
</body>
</html>
