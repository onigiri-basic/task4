<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="style.css">
    <title>Анкета|Форма</title>
</head>
<header>
    <div class="lang-switch">
    <button id="btnRu" class ="btn">Русский</button>
    <button id="btnEn" class ="btn">English</button>
    </div>
</header>
<body>
    <div class="form">
    <div class="title">
    <h1 id="titleL">Заполните пожалуйста форму</h1>
    </div>
    <!-- ФИО -->
    <form id="developerForm" action="#" method="post">
        <label for="fullname" id="fullnameL">ФИО<span style="color:#e53e3e;">*</span></label>
        <input type="text" id="fullname" name="fullname" placeholder="Баранов Андрей Александрович" required>

    <!-- ТЕЛЕФОН -->
        <label for="phone" id="phoneL">Телефон</label>
        <input type="tel" name="phone" placeholder="+7 999 123 45 67" pattern="[\+0-9\s\-\(\)]+">
        <div id="phoneHelpL">+7 или 8</div>

    <!-- email -->
        <label for="email" id="emailL">Почта<span style="color:#e53e3e;">*</span>
        </label>
        <input type="email" id="email" name="email" placeholder="baranow@xemple.com" required>

    <!-- ДАТА РОЖДЕНИЯ -->
        <label for="birthdate" id="birthdateL">Дата рождения</label>
        <input type="date" id="birthdate" name="birthdate">

    <!-- ПОЛ -->
        <label for="gender" id="genderL"></label>
        <input type="radio" name="gender" value="male"><span id="genderMaleL">Мужской</span>
        <input type="radio" name="gender" value="female"><span id="genderFemaleL">Женский</span>
        <input type="radio" name="gender" value="unknown" checked><span id="genderunknownL">Не указан</span>

    <!-- ЛЮБИМЫЙ ЯП -->
        <label for="lang" id=langL>Любимые языки программирования</label>
        <select name="fav_langs" id="fav_langs" multiple size="6">
            <option value="Pascal">Pascal</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="JavaScript">JavaScript</option>
                <option value="PHP">PHP</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="Haskel">Haskel</option>
                <option value="Clojure">Clojure</option>
                <option value="Prolog">Prolog</option>
                <option value="Scala">Scala</option>
                <option value="Go">Go</option>
            <div id="langHelpL">Удерживайте Ctrl (Cmd) для выбора нескольких языков</div>
        </select>

    <!-- БИО-->
        <label id="bioL">Биография</label>
        <textarea id="bio" name="bio" placeholder="Расскажите о себе, опыте разработки, увлечениях и достижениях.."></textarea>

    <!-- Чекбокс -->
        <label id="checkL">Согласие</label>
        <input type="checkbox" name="contract_agreed" id="contractCheck" value="yes">
        <label id="contractL">ознакомлен(а) с условиями пользовательского соглашения и политикой обработки данных</label>

    <!-- кнопка сохранить -->
    <button type="button" id=saveButton>Сохранить</button>
    </form>
    <script src="script.js"></script>
    </div>
<!-- всплывающее уведамление -->

</body>
</html>
